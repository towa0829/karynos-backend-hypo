services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: hypo_user
      POSTGRES_PASSWORD: hypo_pass
      POSTGRES_DB: hypo_db
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hypo_user -d hypo_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./app:/app
      - ./chroma_db:/app/chroma_db
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8080", "--reload"]
